campaign_id: demo-futures-stage3a5-acceptance
mode: sealed_offline_backtest
runner_type: sealed_offline_backtest
scope:
  allowed_paths: ["research/**", "reports/audits/**", "scripts/research_*.py", "scripts/run_offline_backtest.py", "scripts/run_stage3a5_acceptance.py", "scripts/sealed_exchange_factory.py", "scripts/validate_exchange_snapshot.py", "scripts/run_experiment.py", "scripts/validate_strategy_market_contract.py", ".venv-freqtrade/**", "strategies/RegimeAwareV6.py", "strategies"]
  blocked_paths: [".env", "secrets/**", "deploy/**", "user_data/config_live.json", "configs/production/**", "scripts/start_bot.sh", "scripts/refresh_data.sh", "user_data/monitor.env"]
budget:
  max_experiments: 1
  max_total_attempts: 1
  max_consecutive_failures: 1
  max_retries_per_experiment: 0
  max_wall_clock_minutes: 30
autonomy:
  automatically_claim_next: true
  automatically_generate_hypotheses: false
  automatically_promote_champion: false
  access_sealed_holdout: false
  lease_seconds: 300
fixed_backtest:
  runtime_config: research/runtime/freqtrade-runtime.yaml
  dataset_id: demo-btc-usdt-usdt-futures-acceptance-20260329-20260412
  dataset_manifest: research/data/snapshots/demo-btc-usdt-usdt-futures-acceptance-20260329-20260412/manifest.yaml
  subcommand: sealed_offline_backtest
  strategy: RegimeAwareV6
  strategy_file: strategies/RegimeAwareV6.py
  strategy_path: strategies
  config: research/runtime/demo-futures-backtest-config.json
  timerange: 20260329-20260412
  timeframe: 1h
  pairs: ["BTC/USDT:USDT"]
  fee: "0.0004"
  datadir: research/data/snapshots/demo-btc-usdt-usdt-futures-acceptance-20260329-20260412/data
  timeout_seconds: 600
  acceptance_gate:
    coverage:
      min_total_trades: 2
      min_long_trades: 1
      min_short_trades: 1
