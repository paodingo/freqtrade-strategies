  allow_data_audit: true
  allow_snapshot_generation: true
  allow_data_readiness_probe: true
  allow_strategy_modification: false
  allow_candidate_creation: false
  allow_hyperopt: false
  allow_strategy_ranking: false
  allow_hypothesis_generation: false
  allow_champion_promotion: false
  allow_holdout_access: false
stop_conditions: ["single_campaign_complete", "budget_exhausted", "wall_clock_exceeded"]
